# --- 資料庫設定 ---
# 為了練習方便，目前預設使用 H2 記憶體資料庫 (程式關掉資料會消失)
spring.datasource.url=jdbc:h2:mem:indexer_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 啟用 H2 控制台，讓您可以透過瀏覽器查看資料庫內容
spring.h2.console.enabled=true

# JPA 設定：啟動時自動檢查並建立/更新資料表結構
spring.jpa.hibernate.ddl-auto=update

# 高併發優化：開啟 JDBC 批次寫入 (Batch Insert)
# 這能讓 saveAll() 變成單次傳輸，大幅提升高流量時的資料庫效能
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- 以太坊連線設定 ---
# RPC URL：這是與區塊鏈節點溝通的入口網址
ethereum.rpc-url=https://ethereum.publicnode.com

# 確認數 (Confirmations)：落後最新區塊多少格才抓取，增加資料穩定性並防止分叉
ethereum.confirmations=3

# 監控代幣列表：您可以隨時在此加入新的代幣合約地址 (以逗號分隔)
# 目前包含了 USDT, USDC, WETH
ethereum.monitor-tokens=0xdac17f958d2ee523a2206206994597c13d831ec7,0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48,0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2
