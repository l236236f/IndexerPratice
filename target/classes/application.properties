# Database Configuration (MySQL 8 via Docker)
# Make sure your Docker daemon is running and execute: docker-compose up -d
spring.datasource.url=jdbc:mysql://localhost:3306/indexer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- H2 Database Fallback (Uncomment to use without Docker) ---
